<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Registration - Tennis Tournament</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎾 Player Registration</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="admin.html">Admin Panel</a>
            </nav>
        </header>

        <div class="registration-form">
            <div class="card">
                <h2>Create New Tournament</h2>
                
                <form id="tournament-form">
                    <div class="form-group">
                        <label for="tournament-name">Tournament Name</label>
                        <input type="text" id="tournament-name" required placeholder="e.g., Summer Championship 2024">
                    </div>

                    <div class="form-group">
                        <label for="tournament-type">Tournament Type</label>
                        <select id="tournament-type" required>
                            <option value="knockout">Knockout Tournament</option>
                            <option value="league">League Only</option>
                            <option value="league-knockout">League → Knockout</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="court-count">Number of Courts</label>
                        <input type="number" id="court-count" min="1" max="10" value="3" required>
                    </div>

                    <div class="form-group">
                        <label for="match-duration">Match Duration (minutes)</label>
                        <input type="number" id="match-duration" min="15" max="180" value="45">
                    </div>
                </form>
            </div>

            <div class="card">
                <h2>Add Players</h2>
                
                <div class="player-input">
                    <div class="form-group">
                        <label for="player-name">Player Name</label>
                        <div class="input-with-button">
                            <input type="text" id="player-name" placeholder="Enter player name">
                            <button type="button" onclick="addPlayer()" class="btn btn-primary">Add</button>
                        </div>
                    </div>
                </div>

                <div class="players-list">
                    <h3>Registered Players (<span id="player-count">0</span>)</h3>
                    <div id="players-container">
                        <!-- Players will be added here -->
                    </div>
                </div>

                <div class="bulk-import">
                    <h4>Or Import from Text</h4>
                    <textarea id="bulk-players" placeholder="Enter player names, one per line"></textarea>
                    <button onclick="importBulkPlayers()" class="btn btn-outline">Import Players</button>
                </div>
            </div>

            <div class="card">
                <div class="tournament-actions">
                    <button onclick="createTournament()" class="btn btn-primary btn-large" id="create-btn" disabled>
                        Create Tournament
                    </button>
                    <button onclick="clearAll()" class="btn btn-secondary">Clear All</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/tournament.js"></script>
    <script src="js/registration.js"></script>
</body>
</html>
