<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Tennis Tournament</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎾 Admin Panel</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="player.html">Player View</a>
            </nav>
        </header>

        <!-- Tournament Info -->
        <div class="tournament-info">
            <h2 id="tournament-name">Loading...</h2>
            <div class="stats">
                <span>Courts: <span id="court-count">0</span></span>
                <span>Matches: <span id="match-progress">0/0</span></span>
            </div>
        </div>

        <!-- Playing Matches -->
        <section class="match-section">
            <h3>🏆 Currently Playing</h3>
            <div id="playing-matches" class="match-grid">
                <!-- Matches will be populated by JavaScript -->
            </div>
        </section>

        <!-- Next Matches -->
        <section class="match-section">
            <h3>⏳ Up Next</h3>
            <div id="next-matches" class="match-list">
                <!-- Next matches will be populated -->
            </div>
        </section>

        <!-- Waiting Queue -->
        <section class="match-section">
            <h3>⏸️ Waiting Queue</h3>
            <div id="waiting-matches" class="match-list">
                <!-- Waiting matches -->
            </div>
        </section>

        <!-- Score Entry Modal -->
        <div id="score-modal" class="modal">
            <div class="modal-content">
                <h3>Enter Match Result</h3>
                <div class="score-form">
                    <div class="player-score">
                        <label id="player1-name">Player 1</label>
                        <input type="number" id="score1" min="0" max="10">
                    </div>
                    <div class="vs">VS</div>
                    <div class="player-score">
                        <label id="player2-name">Player 2</label>
                        <input type="number" id="score2" min="0" max="10">
                    </div>
                </div>
                <div class="modal-actions">
                    <button onclick="submitScore()" class="btn btn-primary">Submit Result</button>
                    <button onclick="closeModal()" class="btn btn-secondary">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/tournament.js"></script>
    <script>
        // Admin-specific JavaScript
        let currentMatchId = null;

        // Load and display tournament data
        function loadAdminView() {
            const tournament = getTournament();
            if (!tournament) {
                alert('No tournament found. Please create one first.');
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('tournament-name').textContent = tournament.name;
            document.getElementById('court-count').textContent = tournament.courts;
            
            updateMatchDisplays();
        }

        function updateMatchDisplays() {
            const matches = getMatches();
            
            // Clear existing displays
            document.getElementById('playing-matches').innerHTML = '';
            document.getElementById('next-matches').innerHTML = '';
            document.getElementById('waiting-matches').innerHTML = '';

            // Sort matches by queue order
            matches.sort((a, b) => a.queueOrder - b.queueOrder);

            matches.forEach(match => {
                const matchElement = createMatchElement(match);
                
                switch(match.status) {
                    case 'Playing':
                        document.getElementById('playing-matches').appendChild(matchElement);
                        break;
                    case 'Next':
                        document.getElementById('next-matches').appendChild(matchElement);
                        break;
                    case 'Waiting':
                        document.getElementById('waiting-matches').appendChild(matchElement);
                        break;
                }
            });
        }

        function createMatchElement(match) {
            const div = document.createElement('div');
            div.className = 'match-card';
            div.innerHTML = `
                <div class="match-header">
                    <span class="match-id">Match ${match.id}</span>
                    ${match.court ? `<span class="court">Court ${match.court}</span>` : ''}
                </div>
                <div class="match-players">
                    <span>${match.player1}</span>
                    <span class="vs">vs</span>
                    <span>${match.player2}</span>
                </div>
                <div class="match-actions">
                    ${match.status === 'Playing' ? 
                        `<button onclick="openScoreModal(${match.id})" class="btn btn-small">Enter Score</button>` :
                        `<button onclick="moveToPlaying(${match.id})" class="btn btn-small btn-outline">Move to Playing</button>`
                    }
                </div>
            `;
            return div;
        }

        function openScoreModal(matchId) {
            currentMatchId = matchId;
            const match = getMatches().find(m => m.id === matchId);
            
            document.getElementById('player1-name').textContent = match.player1;
            document.getElementById('player2-name').textContent = match.player2;
            document.getElementById('score1').value = '';
            document.getElementById('score2').value = '';
            
            document.getElementById('score-modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('score-modal').style.display = 'none';
            currentMatchId = null;
        }

        function submitScore() {
            const score1 = parseInt(document.getElementById('score1').value);
            const score2 = parseInt(document.getElementById('score2').value);
            
            if (isNaN(score1) || isNaN(score2)) {
                alert('Please enter valid scores');
                return;
            }

            // Submit the result
            submitMatchResult(currentMatchId, score1, score2);
            closeModal();
            updateMatchDisplays();
        }

        function moveToPlaying(matchId) {
            // Manual override to move match to playing
            const tournament = getTournament();
            moveMatchToPlaying(matchId, tournament.courts);
            updateMatchDisplays();
        }

        // Initialize admin view
        document.addEventListener('DOMContentLoaded', loadAdminView);
    </script>
</body>
</html>
